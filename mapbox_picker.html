<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css"
    rel="stylesheet"
  />

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    let map;
    let marker;

    function getMapboxToken() {
      return window.MAPBOX_TOKEN || window.parent?.MAPBOX_TOKEN || null;
    }

    function initMap() {
      if (map) {
        return;
      }

      const token = getMapboxToken();
      if (!token) {
        return;
      }

      mapboxgl.accessToken = token;

      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [31.2357, 30.0444],
        zoom: 14
      });

      marker = new mapboxgl.Marker()
        .setLngLat([31.2357, 30.0444])
        .addTo(map);

      map.on('click', (e) => {
        marker.setLngLat(e.lngLat);

        window.parent.postMessage({
          lat: e.lngLat.lat,
          lng: e.lngLat.lng
        }, '*');
      });
    }

    window.setMapboxToken = function setMapboxToken(token) {
      window.MAPBOX_TOKEN = token;
      initMap();
    };

    window.addEventListener('load', initMap);
  </script>
</body>
</html>
