name: restaurant_customer
description: "Restaurant Customer App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^18.0.1
  http: ^1.3.0
  google_sign_in: ^6.3.0
  cached_network_image: ^3.4.1
  supabase_flutter: ^2.5.6
  mapbox_maps_flutter: ^2.4.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/env/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
    - family: "Noto Sans"
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
    - family: "Noto Sans Arabic"
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
