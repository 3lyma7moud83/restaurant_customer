<!DOCTYPE html>
<html>
<head>
  <!-- مهم جدًا لعمل Flutter -->
  <base href="$FLUTTER_BASE_HREF" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
  />
  <meta name="description" content="delivery-mat3mk food delivery platform" />

  <!-- 📱 Mobile / PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="delivery-mat3mk" />

  <link rel="apple-touch-icon" href="icons/Icon-192.png" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json" />

  <title>delivery-mat3mk</title>

  <!-- ستايل أساسي -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: var(--app-height, 100%);
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      background: #f7f5f1;
    }

    body {
      position: fixed;
      inset: 0;
    }

    @supports (height: 100dvh) {
      html, body {
        height: min(100dvh, var(--app-height, 100dvh));
      }
    }
  </style>
</head>

<body>
  <script>
    (function () {
      function applyAppHeight() {
        var viewport = window.visualViewport;
        var height = viewport ? viewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', height + 'px');
      }

      applyAppHeight();
      window.addEventListener('resize', applyAppHeight);
      window.addEventListener('orientationchange', applyAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyAppHeight);
        window.visualViewport.addEventListener('scroll', applyAppHeight);
      }
    })();
  </script>

  <script>
    (function () {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      var registrationPromise = navigator.serviceWorker
        .register('firebase-messaging-sw.js')
        .then(function (registration) {
          console.log(
            '[FCM][web] firebase-messaging-sw.js registered:',
            registration.scope,
          );
          return navigator.serviceWorker.ready;
        })
        .then(function (readyRegistration) {
          console.log(
            '[FCM][web] firebase-messaging-sw.js ready:',
            readyRegistration.scope,
          );
          return readyRegistration;
        })
        .catch(function (error) {
          console.error('[FCM][web] service worker registration failed.', error);
          return null;
        });

      window.__fcmServiceWorkerReady = registrationPromise;
    })();
  </script>

  <!-- ===================== -->
  <!-- Flutter bootstrap -->
  <!-- ===================== -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
